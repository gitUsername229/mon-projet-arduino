<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureSafe - Casier</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
</head>

<body class="dark-theme">
    <div id="bg-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="navbar glass-panel fade-in">
        <h1 class="brand cursor-pointer" onclick="window.location.href='/'">SecureSafe</h1>
        <div class="flex items-center gap-4">
            <div class="profile-menu" id="profile-menu">
                <div class="flex items-center gap-2 cursor-pointer"
                    onclick="document.getElementById('profile-menu').classList.toggle('open')">
                    <span class="font-semibold text-gradient" id="nav-username"></span>
                    <span>▼</span>
                </div>
                <div class="profile-dropdown">
                    <button class="dropdown-item" onclick="window.location.href='/profile.html'">Gestion mot de
                        passe</button>
                    <button class="dropdown-item" id="nav-btn-register"
                        onclick="window.location.href='/register.html'">Créer un compte</button>
                    <hr style="border-color: var(--border-color); margin: 0.25rem 0;" />
                    <button class="dropdown-item" style="color: var(--danger)"
                        onclick="window.logout()">Déconnexion</button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex flex-col min-h-screen">
        <div class="fade-in" style="padding: 2rem;">
            <div class="locker-header flex justify-between items-center mb-6">
                <h2 class="text-3xl flex items-center gap-2">
                    <span id="lockerName"></span>
                    <button class="btn btn-outline" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;"
                        onclick="window.renameLocker()">✎</button>
                    <span class="text-muted text-lg" id="lockerIdTitle"></span>
                </h2>
                <button class="btn btn-primary" id="btnUnlock">Ouvrir le casier</button>
            </div>

            <div id="lockerFeedback" class="text-center text-muted mb-4">Chargement...</div>

            <div class="layout-dashboard layout-locker" id="lockerContent" style="display:none;">
                <div class="flex-col gap-6">
                    <section class="glass-panel p-6 mb-6" style="padding: 1.5rem">
                        <h3 class="text-lg font-semibold mb-4">Historique d'accès</h3>
                        <div style="overflow-x: auto;">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date & Heure</th>
                                        <th>Badge UID</th>
                                        <th>Statut</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="lockerHistoryBody"></tbody>
                            </table>
                        </div>
                    </section>
                </div>

                <div class="flex-col gap-6">
                    <section class="glass-panel p-6" style="padding: 1.5rem; margin-bottom: 1.5rem;">
                        <h3 class="text-lg font-semibold mb-4">Gérer les accès (Utilisateurs)</h3>
                        <div class="relative mb-4">
                            <input type="text" class="input" placeholder="Rechercher (10 max)..." id="searchInput" />
                            <div id="search-results" class="search-results hidden"></div>
                        </div>
                        <div id="lockerUsersList" class="users-list"></div>
                    </section>

                    <section class="glass-panel p-6" style="padding: 1.5rem; margin-bottom: 1.5rem;">
                        <h3 class="text-lg font-semibold mb-4">Badges Accrédités</h3>
                        <div class="flex gap-2 mb-4">
                            <input type="text" id="newBadgeUid" class="input" placeholder="Nouveau UID" />
                            <button class="btn btn-outline" id="btnAddBadge">Accréditer</button>
                        </div>
                        <div id="lockerBadgesList" class="badges-list"></div>
                    </section>

                    <section class="glass-panel p-6" style="padding: 1.5rem">
                        <h3 class="text-lg font-semibold mb-4">Configuration Keypad</h3>
                        <div class="flex gap-2">
                            <input type="text" id="newKeypadCode" class="input" maxlength="8" />
                            <button class="btn btn-outline" id="btnSaveKeypad">Sauvegarder</button>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/locker.js"></script>
</body>

</html>
