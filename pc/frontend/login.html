<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureSafe - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
</head>
<body class="dark-theme">
    <div id="bg-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <main class="flex flex-col items-center justify-center min-h-screen p-8">
        <div class="glass-panel login-container w-full max-w-sm fade-in">
            <h2 class="text-3xl text-gradient mb-6 text-center">Connexion</h2>
            <form id="login-form">
                <div class="form-group mb-4">
                    <label class="input-label">Login</label>
                    <input type="text" id="loginUsername" class="input" required>
                </div>
                <div class="form-group mb-6">
                    <label class="input-label">Mot de passe</label>
                    <input type="password" id="loginPassword" class="input" required>
                </div>
                <button type="submit" class="btn btn-primary w-full">Se connecter</button>
                <div id="loginError" class="form-error mt-4 text-center"></div>
            </form>
        </div>
    </main>

    <script type="module" src="/login.js"></script>
</body>
</html>
